<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Offline MP3 Narrator</title>
    <style>
        :root { --primary: #2563eb; --bg: #f8fafc; --surface: #ffffff; --text: #1e293b; --danger: #dc2626; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg); color: var(--text); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .container { background: var(--surface); padding: 2rem; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); width: 100%; max-width: 600px; }
        h1 { margin-top: 0; font-size: 1.5rem; text-align: center; margin-bottom: 1.5rem; }
        
        /* Voice Selection Styling */
        .voice-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 1rem; }
        .voice-option { padding: 10px; border: 2px solid #e2e8f0; border-radius: 8px; cursor: pointer; text-align: center; transition: all 0.2s; background: white; }
        .voice-option:hover { border-color: #cbd5e1; }
        .voice-option.active { border-color: var(--primary); background: #eff6ff; color: var(--primary); font-weight: bold; }

        /* Text Area */
        #textInput { width: 100%; height: 200px; border: 1px solid #cbd5e1; border-radius: 6px; padding: 10px; font-size: 1.1rem; line-height: 1.6; overflow-y: auto; background: white; outline: none; margin-bottom: 1rem; }
        
        /* Highlight Effect */
        .highlight { background-color: #fef08a; border-radius: 3px; padding: 0 2px; }

        button { width: 100%; padding: 12px; border-radius: 6px; border: none; font-size: 1rem; cursor: pointer; background: var(--primary); color: white; transition: background 0.2s; }
        button:hover { background: #1d4ed8; }
        button:disabled { background: #94a3b8; cursor: not-allowed; }
        
        .button-group { display: flex; gap: 10px; margin-top: 0.5rem; }
        .button-group button { flex: 1; }

        .recording { background: var(--danger); animation: pulse 1s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.7; } 100% { opacity: 1; } }
        .log { font-size: 0.85rem; color: #64748b; margin-top: 10px; text-align: center; font-family: monospace; }
    </style>
</head>
<body>

    <div class="container">
        <h1>Pro Narrator (Offline)</h1>

        <!-- 4 Voice Options -->
        <div class="voice-grid" id="voiceGrid">
            <div class="voice-option active" data-voice="us-female">🇺🇸 US Female</div>
            <div class="voice-option" data-voice="us-male">🇺🇸 US Male</div>
            <div class="voice-option" data-voice="uk-female">🇬🇧 UK Female</div>
            <div class="voice-option" data-voice="uk-male">🇬🇧 UK Male</div>
        </div>

        <div id="textInput" contenteditable="true" placeholder="Type text here... (Works offline)"></div>

        <div class="button-group">
            <button id="speakBtn">Speak</button>
            <button id="downloadBtn">Save as MP3</button>
        </div>
        <div id="log" class="log"></div>
    </div>
