<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Text-to-Speech MP3 Narrator</title>
    <!-- Load LameJS for MP3 Encoding from CDN -->
    <script src="https://cdn.jsdelivr.net/npm/lamejs@1.2.1/lame.min.js"></script>
    <style>
        :root { --primary: #2563eb; --bg: #f8fafc; --surface: #ffffff; --text: #1e293b; --danger: #dc2626; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg); color: var(--text); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .container { background: var(--surface); padding: 2rem; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); width: 100%; max-width: 600px; }
        h1 { margin-top: 0; font-size: 1.5rem; text-align: center; margin-bottom: 1.5rem; }
        
        /* Voice Selection Styling */
        .voice-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 1rem; }
        .voice-option { padding: 10px; border: 2px solid #e2e8f0; border-radius: 8px; cursor: pointer; text-align: center; transition: all 0.2s; background: white; }
        .voice-option:hover { border-color: #cbd5e1; }
        .voice-option.active { border-color: var(--primary); background: #eff6ff; color: var(--primary); font-weight: bold; }

        /* Text Area */
        #textInput { width: 100%; height: 200px; border: 1px solid #cbd5e1; border-radius: 6px; padding: 10px; font-size: 1.1rem; line-height: 1.6; overflow-y: auto; background: white; outline: none; margin-bottom: 1rem; }
        
        /* Highlight Effect */
        .highlight { background-color: #fef08a; border-radius: 3px; padding: 0 2px; }

        button { width: 100%; padding: 12px; border-radius: 6px; border: none; font-size: 1rem; cursor: pointer; background: var(--primary); color: white; transition: background 0.2s; }
        button:hover { background: #1d4ed8; }
        button:disabled { background: #94a3b8; cursor: not-allowed; }
        
        .button-group { display: flex; gap: 10px; margin-top: 0.5rem; }
        .button-group button { flex: 1; }

        .recording { background: var(--danger); animation: pulse 1s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.7; } 100% { opacity: 1; } }
        .log { font-size: 0.85rem; color: #64748b; margin-top: 10px; text-align: center; font-family: monospace; }
    </style>
</head>
<body>

    <div class="container">
        <h1>Narrator</h1>

        <!-- 4 Voice Options -->
        <div class="voice-grid" id="voiceGrid">
            <div class="voice-option active" data-voice="us-female">🇺🇸 US Female</div>
            <div class="voice-option" data-voice="us-male">🇺🇸 US Male</div>
            <div class="voice-option" data-voice="uk-female">🇬🇧 UK Female</div>
            <div class="voice-option" data-voice="uk-male">🇬🇧 UK Male</div>
        </div>

        <div id="textInput" contenteditable="true" placeholder="Type or paste text here..."></div>

        <div class="button-group">
            <button id="speakBtn">Speak</button>
            <button id="downloadBtn">Save as MP3</button>
        </div>
        <div id="log" class="log"></div>
    </div>

    <script>
        const App = {
            elements: {
                textInput: document.getElementById('textInput'),
                voiceGrid: document.getElementById('voiceGrid'),
                speakBtn: document.getElementById('speakBtn'),
                downloadBtn: document.getElementById('downloadBtn'),
                log: document.getElementById('log')
            },
            synth: window.speechSynthesis,
            voices: [],
            selectedVoiceType: 'us-female',
            mappedVoices: {},
            mediaRecorder: null,
            audioChunks: [],

            init() {
                if (!this.synth) { alert("TTS not supported"); return; }
                
                this.loadVoices();
                this.synth.onvoiceschanged = () => this.loadVoices();

                // UI Interactions
                this.elements.voiceGrid.addEventListener('click', (e) => {
                    if (e.target.classList.contains('voice-option')) {
                        document.querySelectorAll('.voice-option').forEach(el => el.classList.remove('active'));
                        e.target.classList.add('active');
                        this.selectedVoiceType = e.target.dataset.voice;
                    }
                });

                this.elements.speakBtn.addEventListener('click', () => this.speak());
                this.elements.downloadBtn.addEventListener('click', () => this.startRecording());
            },

            loadVoices() {
                this.voices = this.synth.getVoices();
                this.mapVoicesToCategories();
            },

            // Smart mapping to find voices
            mapVoicesToCategories() {
                this.mappedVoices = { 'us-female': null, 'us-male': null, 'uk-female': null, 'uk-male': null };
                
                this.voices.forEach(voice => {
                    const name = voice.name.toLowerCase();
                    const lang = voice.lang.toLowerCase();
                    
                    // US English Detection
                    if (lang === 'en-us' || lang === 'en_us') {
                        if (name.includes('female') || name.includes('zira') || name.includes('samantha') || name.includes('susan')) {
                            this.mappedVoices['us-female'] = voice;
                        } else if (name.includes('male') || name.includes('david') || name.includes('mark') || name.includes('alex')) {
                            this.mappedVoices['us-male'] = voice;
                        } else {
                            // Fallback if gender not in name
                            if (!this.mappedVoices['us-female']) this.mappedVoices['us-female'] = voice;
                            if (!this.mappedVoices['us-male']) this.mappedVoices['us-male'] = voice;
                        }
                    }
                    
                    // UK English Detection
                    if (lang === 'en-gb' || lang === 'en_gb') {
                        if (name.includes('female') || name.includes('hazel') || name.includes('susan') || name.includes('serena')) {
                            this.mappedVoices['uk-female'] = voice;
                        } else if (name.includes('male') || name.includes('george') || name.includes('daniel') || name.includes('brian')) {
                            this.mappedVoices['uk-male'] = voice;
                        } else {
                            if (!this.mappedVoices['uk-female']) this.mappedVoices['uk-female'] = voice;
                            if (!this.mappedVoices['uk-male']) this.mappedVoices['uk-male'] = voice;
                        }
                    }
                });

                // Final Fallback: If specific countries not found, use any English voice
                const anyEnglish = this.voices.find(v => v.lang.startsWith('en'));
                const keys = Object.keys(this.mappedVoices);
                keys.forEach(k => { if(!this.mappedVoices[k]) this.mappedVoices[k] = anyEnglish; });
            },

            getText() { return this.elements.textInput.innerText.trim(); },

            speak() {
                const text = this.getText();
                if (!text) return alert("Please enter text.");

                if (this.synth.speaking) {
                    this.synth.cancel();
                    return; 
                }

                const utterance = new SpeechSynthesisUtterance(text);
                const voice = this.mappedVoices[this.selectedVoiceType];
                if (voice) utterance.voice = voice;

                // --- HIGHLIGHTING LOGIC ---
                const textContent = text;
                const words = textContent.split(/\s+/); 
                let wordIndex = 0;

                utterance.onboundary = (event) => {
                    if (event.name === 'word') {
                        this.highlightWord(words, wordIndex);
                        wordIndex++;
                    }
                };

                utterance.onend = () => {
                    this.clearHighlights();
                };

                this.synth.speak(utterance);
            },

            highlightWord(words, index) {
                let html = "";
                words.forEach((word, i) => {
                    if (i === index) {
                        html += `<span class="highlight">${word}</span> `;
                    } else {
                        html += word + " ";
                    }
                });
                this.elements.textInput.innerHTML = html;
            },

            clearHighlights() {
                const text = this.elements.textInput.innerText;
                this.elements.textInput.innerHTML = text;
            },

            // --- DOWNLOAD LOGIC ---
            async startRecording() {
                const text = this.getText();
                if (!text) return alert("Enter text first.");

                try {
                    this.logMsg("Step 1: Requesting audio stream...");
                    const stream = await navigator.mediaDevices.getDisplayMedia({ video: true, audio: true });
                    const audioTrack = stream.getAudioTracks()[0];

                    if (!audioTrack) {
                        alert("ERROR: You must select a window/tab AND check 'Share Audio'.");
                        stream.getTracks().forEach(t => t.stop());
                        return;
                    }

                    this.audioChunks = [];
                    this.mediaRecorder = new MediaRecorder(audioTrack);
                    
                    this.mediaRecorder.ondataavailable = e => this.audioChunks.push(e.data);
                    
                    this.mediaRecorder.onstop = async () => {
                        this.logMsg("Step 2: Creating MP3 file...");
                        const webmBlob = new Blob(this.audioChunks, { type: 'audio/webm' });
                        await this.convertToMp3(webmBlob);
                        stream.getTracks().forEach(t => t.stop());
                        this.elements.downloadBtn.textContent = "Save as MP3";
                        this.elements.downloadBtn.classList.remove('recording');
                    };

                    // Start
                    this.mediaRecorder.start();
                    this.elements.downloadBtn.textContent = "Recording...";
                    this.elements.downloadBtn.classList.add('recording');
                    
                    const utterance = new SpeechSynthesisUtterance(text);
                    const voice = this.mappedVoices[this.selectedVoiceType];
                    if (voice) utterance.voice = voice;
                    
                    this.synth.speak(utterance);

                    utterance.onend = () => {
                        setTimeout(() => {
                            if (this.mediaRecorder && this.mediaRecorder.state !== 'inactive') {
                                this.mediaRecorder.stop();
                            }
                        }, 500);
                    };

                } catch (e) {
                    this.logMsg("Error: " + e.message);
                }
            },

            async convertToMp3(webmBlob) {
                try {
                    const arrayBuffer = await webmBlob.arrayBuffer();
                    const audioContext = new (window.AudioContext || window.webkitAudioContext)();
                    const audioBuffer = await audioContext.decodeAudioData(arrayBuffer);

                    // LameJS Encoder
                    const mp3encoder = new lamejs.Mp3Encoder(1, audioBuffer.sampleRate, 128);
                    const samples = audioBuffer.getChannelData(0);
                    const sampleBlockSize = 1152; 
                    const mp3Data = [];

                    // Convert Float32 to Int16
                    const samples16 = new Int16Array(samples.length);
                    for (let i = 0; i < samples.length; i++) {
                        let s = samples[i];
                        s = s < 0 ? s * 0x8000 : s * 0x7FFF;
                        samples16[i] = s;
                    }

                    for (let i = 0; i < samples16.length; i += sampleBlockSize) {
                        const sampleChunk = samples16.subarray(i, i + sampleBlockSize);
                        const mp3buf = mp3encoder.encodeBuffer(sampleChunk);
                        if (mp3buf.length > 0) mp3Data.push(mp3buf);
                    }
                    
                    const end = mp3encoder.flush();
                    if (end.length > 0) mp3Data.push(end);

                    const mp3Blob = new Blob(mp3Data, { type: 'audio/mp3' });
                    const url = URL.createObjectURL(mp3Blob);
                    
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = 'narration.mp3';
                    document.body.appendChild(a);
                    a.click();
                    document.body.removeChild(a);
                    
                    this.logMsg("Success! MP3 Downloaded.");

                } catch (err) {
                    console.error(err);
                    this.logMsg("Conversion failed.");
                }
            },

            logMsg(msg) { this.elements.log.textContent = msg; }
        };

        App.init();
    </script>
</body>
</html>
